---
# DO NOT EDIT this file in a service repository.
# It should be changed in the `template` repository, and then copied to there as-is.
# All differences should be encapsulated in Makefile targets.

name: CI
on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:

permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write

env:
  GONOPROXY: 'github.com/percona'
  GONOSUMDB: 'github.com/percona'
  GOPRIVATE: 'github.com/percona'

jobs:
  test:
    name: Test
    timeout-minutes: 10
    continue-on-error: false
    runs-on: ubuntu-latest

    steps:
      - name: Configure git for private modules
        run: echo 'machine github.com login percona-robot password ${{ secrets.ROBOT_TOKEN }}' > $HOME/.netrc

      - name: Check out code into the Go module directory
        uses: actions/checkout@v6.0.3
        with:
          lfs: true

      - name: Set up Go release
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: ${{ github.workspace }}/go.mod
          cache-dependency-path: "**/go.sum"

      - name: Build binaries
        run: make build

      - name: Run tests
        run: |
          make test

      - name: Run debug commands on failure
        if: ${{ failure() }}
        run: |
          env | sort
          go version
          go env | sort
          pwd
          git status

  check:
    name: Static checks
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    continue-on-error: false
    runs-on: ubuntu-latest

    steps:
      - name: Configure git for private modules
        run: echo 'machine github.com login percona-robot password ${{ secrets.ROBOT_TOKEN }}' > $HOME/.netrc

      - name: Check out code into the Go module directory
        uses: actions/checkout@v6.0.3

      - name: Set up Go release
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: ${{ github.workspace }}/go.mod
          cache-dependency-path: "**/go.sum"

      - name: Install development tools
        run: |
          make init

      - name: Check that there are no source code changes
        run: |
          make format
          git status
          git diff --exit-code

      - name: Run code linters
        uses: reviewdog/action-golangci-lint@v2.10.0
        if: ${{ github.event_name == 'pull_request' }}
        with:
          github_token: ${{ secrets.ROBOT_TOKEN || secrets.GITHUB_TOKEN }}
          go_version_file: ${{ github.workspace }}/go.mod
          reporter: github-pr-review
          fail_level: error
          cache: false
          golangci_lint_flags: "-c=.golangci.yml"
          golangci_lint_version: v2.12.2 # Version should match specified in Makefile

      - name: Run debug commands on failure
        if: ${{ failure() }}
        run: |
          env | sort
          go version
          go env | sort
          pwd
          git status
